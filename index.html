<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios Semanales</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F3;--surface:#FFFFFF;--border:#E5E3DC;--text:#1A1917;--muted:#6B6966;--faint:#AEACA7;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.app{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
header{margin-bottom:24px;}
header h1{font-size:22px;font-weight:500;letter-spacing:-0.3px;margin-bottom:4px;}
header p{font-size:13px;color:var(--muted);}
.nav{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--border);}
.nav-btn{padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--text);font-weight:500;border-bottom-color:var(--text);}
.view{display:none;}
.view.active{display:block;}
/* GRILLA */
.grid-info{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.lsq{width:9px;height:9px;border-radius:2px;}
.grid-wrap{overflow-x:auto;}
.grid-inner{display:flex;min-width:700px;}
.time-col{display:flex;flex-direction:column;align-items:flex-end;padding-right:6px;flex-shrink:0;padding-top:30px;}
.time-label{height:20px;font-size:10px;color:var(--faint);line-height:20px;font-family:'DM Mono',monospace;}
.days-area{display:flex;gap:3px;flex:1;}
.day-col{flex:1;min-width:0;}
.day-hdr{font-size:11px;font-weight:500;color:var(--muted);text-align:center;padding:4px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;}
.col-inner{display:flex;gap:1px;}
.pcol{flex:1;min-width:16px;position:relative;}
.block{position:absolute;left:1px;right:1px;border-radius:3px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;transition:box-shadow .12s;}
.block:hover{box-shadow:0 0 0 2px rgba(0,0,0,.3);}
.block.selected{box-shadow:0 0 0 2px #1A1917;}
.block span{writing-mode:vertical-rl;transform:rotate(180deg);font-size:9px;font-weight:500;white-space:nowrap;overflow:hidden;padding:2px 0;}
.dhandle{position:absolute;left:0;right:0;height:8px;cursor:ns-resize;z-index:5;display:flex;align-items:center;justify-content:center;}
.dhandle::after{content:'';width:14px;height:2px;border-radius:1px;background:rgba(0,0,0,.2);}
.dhandle.top{top:0;}
.dhandle.bottom{bottom:0;}
.editor{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;z-index:1000;min-width:210px;box-shadow:0 8px 24px rgba(0,0,0,.1);display:none;}
.editor h3{font-size:13px;font-weight:500;margin-bottom:12px;}
.editor label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
.editor input[type=time]{font-size:12px;font-family:'DM Mono',monospace;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%;margin-bottom:10px;}
.editor input[type=time]:focus{outline:none;border-color:var(--faint);}
.ed-dur{font-size:12px;color:var(--muted);margin-bottom:10px;}
.ed-row{display:flex;gap:6px;margin-bottom:8px;}
.ed-row button{flex:1;padding:6px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);cursor:pointer;}
.ed-row button:hover{background:var(--bg);}
.ed-close{position:absolute;top:10px;right:12px;background:none;border:none;font-size:16px;cursor:pointer;color:var(--faint);line-height:1;}
.rot-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.rot-btn{padding:7px 14px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text);cursor:pointer;}
.rot-btn:hover{background:var(--bg);}
.rot-note{font-size:11px;color:var(--muted);margin-top:8px;}
.tip{position:fixed;background:var(--text);color:#fff;border-radius:7px;padding:6px 10px;font-size:11px;pointer-events:none;z-index:999;display:none;line-height:1.5;}
/* FICHAS */
.emp-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.etab{padding:7px 16px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;}
.etab:hover{border-color:var(--faint);color:var(--text);}
.etab.active{background:var(--text);color:#fff;border-color:var(--text);}
.etab .dot{width:7px;height:7px;border-radius:50%;}
.etab.active .dot{filter:brightness(3);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;flex-shrink:0;font-family:'DM Mono',monospace;}
.card-hdr-info h2{font-size:16px;font-weight:500;margin-bottom:4px;}
.badge{display:inline-block;padding:2px 9px;border-radius:8px;font-size:11px;font-weight:500;}
.day-row{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);}
.day-row:last-child{border-bottom:none;}
.day-lbl{font-size:11px;font-weight:500;color:var(--muted);width:96px;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px;}
.day-sh{font-size:13px;color:var(--text);flex:1;}
.day-sh.libre{color:var(--faint);font-style:italic;}
.day-sh.rot{color:var(--muted);font-style:italic;}
.hrs-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:10px;margin-left:auto;flex-shrink:0;}
.total-bar{padding:13px 20px;background:var(--bg);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);}
.total-bar span:first-child{font-size:12px;color:var(--muted);}
.total-bar span:last-child{font-size:15px;font-weight:500;}
.preview-sec{padding:16px 20px;border-top:1px solid var(--border);}
.preview-sec h3{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.preview-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:12px;line-height:1.8;white-space:pre-wrap;color:var(--text);font-family:'DM Mono',monospace;max-height:200px;overflow-y:auto;}
.copy-btn{margin-top:10px;width:100%;padding:10px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s;}
.copy-btn:hover{background:var(--bg);}
.copy-btn.copied{background:#E6F5EE;border-color:#3DB87A;color:#0A5C38;}
.sum-wrap{overflow-x:auto;padding:0 20px 20px;}
.sum-wrap table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px;}
.sum-wrap th{padding:8px;font-weight:500;font-size:11px;color:var(--muted);text-align:center;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;}
.sum-wrap th:first-child{text-align:left;}
.sum-wrap td{padding:9px 8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;line-height:1.4;}
.sum-wrap td:first-child{text-align:left;font-weight:500;}
.sum-wrap tr:last-child td{border-bottom:none;}
.emp-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;}
@media(max-width:600px){.day-lbl{width:72px;}.nav-btn{padding:9px 10px;font-size:12px;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Horarios semanales</h1>
    <p>Cantina · Mantenimiento · Serenos</p>
  </header>
  <nav class="nav">
    <button class="nav-btn active" onclick="showView('grilla',this)">Grilla visual</button>
    <button class="nav-btn" onclick="showView('fichas',this)">Fichas por empleado</button>
    <button class="nav-btn" onclick="showView('resumen',this)">Resumen general</button>
  </nav>
  <div id="view-grilla" class="view active">
    <div class="grid-info">💡 <strong>Clic</strong> sobre un turno para editar · <strong>Arrastrá</strong> el borde superior o inferior para extender o acortar</div>
    <div class="legend" id="legend"></div>
    <div class="grid-wrap"><div class="grid-inner">
      <div class="time-col" id="timecol"></div>
      <div class="days-area" id="daysarea"></div>
    </div></div>
    <div class="rot-btns">
      <button class="rot-btn" onclick="rotVi()">↺ Rotar Viernes</button>
      <button class="rot-btn" onclick="rotSab()">↺ Rotar Sábado</button>
      <button class="rot-btn" onclick="rotDom()">↺ Rotar Domingo</button>
    </div>
    <p class="rot-note" id="rot-note"></p>
  </div>
  <div id="view-fichas" class="view">
    <div class="emp-tabs" id="emp-tabs"></div>
    <div id="ficha-content"></div>
  </div>
  <div id="view-resumen" class="view">
    <div id="resumen-content"></div>
  </div>
</div>
<div class="editor" id="editor">
  <button class="ed-close" onclick="closeEditor()">✕</button>
  <h3 id="ed-title"></h3>
  <label>Entrada</label><input type="time" id="ed-in" step="1800" oninput="applyEdit()">
  <label>Salida</label><input type="time" id="ed-out" step="1800" oninput="applyEdit()">
  <p class="ed-dur" id="ed-dur"></p>
  <div class="ed-row">
    <button onclick="shiftBlock(-1)">− 30 min</button>
    <button onclick="shiftBlock(1)">+ 30 min</button>
  </div>
  <div class="ed-row"><button onclick="closeEditor()">Cerrar</button></div>
</div>
<div class="tip" id="tip"></div>
<script>
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const START_H=6,SLOTS=(30-START_H)*2;
const EMP={
  Gonzalo:{color:'#5DB87A',bg:'#E6F5EE',text:'#0A5C38',area:'Cantina'},
  Daniela:{color:'#E07A5A',bg:'#FEEEE9',text:'#7A2E18',area:'Cantina'},
  Erik:{color:'#3BAAA0',bg:'#E3F5F4',text:'#0A4C48',area:'Cantina'},
  Cesar:{color:'#E0A429',bg:'#FEF3E2',text:'#7A4A08',area:'Cantina'},
  Oscar:{color:'#4A7FD4',bg:'#E8F0FB',text:'#1A4A8A',area:'Mantenimiento'},
  William:{color:'#3C3489',bg:'#EFECFC',text:'#3D2E9C',area:'Mantenimiento'},
  Miguel:{color:'#1D9E75',bg:'#E1F5EE',text:'#085041',area:'Mantenimiento'},
  Felipe:{color:'#378ADD',bg:'#DEEDFB',text:'#0C447C',area:'Sereno'},
  'Ser.Sáb':{color:'#888780',bg:'#F1EFE8',text:'#2C2C2A',area:'Sereno'},
};
const AREA_STYLE={Cantina:{bg:'#E6F5EE',text:'#0A5C38'},Mantenimiento:{bg:'#E8F0FB',text:'#1A4A8A'},Sereno:{bg:'#EFECFC',text:'#3D2E9C'}};
function ps(str){let [h,m]=str.split(':').map(Number);if(h<START_H)h+=24;return (h-START_H)*2+(m/30);}
function fmt(s){const t=(s+START_H*2)*30,h=Math.floor(t/60)%24,m=t%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function fmtD(s){const t=(s+START_H*2)*30,h=Math.floor(t/60),m=t%60;return String(h%24).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function hrsN(s,e){return ((e-s)*30/60);}
function hrsStr(s,e){return hrsN(s,e).toFixed(1);}
const VI=[
  [{name:'Erik',s:ps('13:30'),e:ps('21:30')},{name:'Gonzalo',s:ps('18:00'),e:ps('25:00')},{name:'Cesar',s:ps('17:00'),e:ps('25:00')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Gonzalo',s:ps('13:30'),e:ps('21:30')},{name:'Erik',s:ps('18:00'),e:ps('25:00')},{name:'Cesar',s:ps('17:00'),e:ps('25:00')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}],
];
const SAB=[
  [{name:'Gonzalo',s:ps('7:30'),e:ps('15:30')},{name:'Erik',s:ps('15:30'),e:ps('25:30')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Ser.Sáb',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Daniela',s:ps('7:30'),e:ps('15:30')},{name:'Cesar',s:ps('15:30'),e:ps('25:30')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Ser.Sáb',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Erik',s:ps('9:30'),e:ps('17:30')},{name:'Gonzalo',s:ps('17:30'),e:ps('25:30')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Ser.Sáb',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Cesar',s:ps('9:30'),e:ps('17:30')},{name:'Daniela',s:ps('17:30'),e:ps('25:30')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Ser.Sáb',s:ps('22:00'),e:ps('32:00')}],
];
const DOM=[
  [{name:'Gonzalo',s:ps('9:30'),e:ps('17:30')},{name:'Erik',s:ps('17:30'),e:ps('25:30')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Daniela',s:ps('9:30'),e:ps('17:30')},{name:'Cesar',s:ps('17:30'),e:ps('25:30')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Erik',s:ps('9:30'),e:ps('17:30')},{name:'Gonzalo',s:ps('17:30'),e:ps('25:30')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}],
  [{name:'Cesar',s:ps('9:30'),e:ps('17:30')},{name:'Daniela',s:ps('17:30'),e:ps('25:30')},{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}],
];
let rVi=0,rSab=0,rDom=0;
function mkB(arr){return arr.map(b=>({...b}));}
let days=[
  {label:'Lunes',blocks:mkB([{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Gonzalo',s:ps('13:30'),e:ps('21:30')},{name:'Daniela',s:ps('17:00'),e:ps('25:00')},{name:'Cesar',s:ps('18:00'),e:ps('26:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}])},
  {label:'Martes',blocks:mkB([{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Gonzalo',s:ps('17:00'),e:ps('21:00')},{name:'Daniela',s:ps('13:30'),e:ps('21:00')},{name:'Erik',s:ps('18:00'),e:ps('26:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}])},
  {label:'Miércoles',blocks:mkB([{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Daniela',s:ps('13:30'),e:ps('21:00')},{name:'Erik',s:ps('17:00'),e:ps('25:00')},{name:'Cesar',s:ps('18:00'),e:ps('26:00')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}])},
  {label:'Jueves',blocks:mkB([{name:'Oscar',s:ps('8:00'),e:ps('16:00')},{name:'William',s:ps('14:00'),e:ps('22:00')},{name:'Miguel',s:ps('8:00'),e:ps('16:00')},{name:'Gonzalo',s:ps('17:00'),e:ps('25:00')},{name:'Daniela',s:ps('18:00'),e:ps('26:00')},{name:'Erik',s:ps('13:30'),e:ps('21:30')},{name:'Felipe',s:ps('22:00'),e:ps('32:00')}])},
  {label:'Viernes',blocks:mkB(VI[0])},
  {label:'Sábado',blocks:mkB(SAB[0])},
  {label:'Domingo',blocks:mkB(DOM[0])},
];
let selBlock=null,curBlock=null,curLabel='',dragging=null;
function renderGrid(){
  const tc=document.getElementById('timecol');tc.innerHTML='';
  for(let i=0;i<SLOTS;i++){const t=(i+START_H*2)*30,h=Math.floor(t/60),m=t%60;tc.innerHTML+=`<div class="time-label">${m===0?String(h%24).padStart(2,'0')+':00':''}</div>`;}
  const da=document.getElementById('daysarea');da.innerHTML='';
  days.forEach(day=>{
    const dc=document.createElement('div');dc.className='day-col';
    const hdr=document.createElement('div');hdr.className='day-hdr';hdr.textContent=day.label.slice(0,3);dc.appendChild(hdr);
    const colMap={};day.blocks.forEach(b=>{if(!colMap[b.name])colMap[b.name]=[];colMap[b.name].push(b);});
    const ci=document.createElement('div');ci.className='col-inner';ci.style.cssText=`height:${SLOTS*20}px;position:relative;`;
    Object.keys(colMap).forEach(name=>{
      const pcol=document.createElement('div');pcol.className='pcol';pcol.style.height=(SLOTS*20)+'px';
      const c=EMP[name]||{bg:'#ddd',text:'#333'};
      colMap[name].forEach(b=>{
        const s=Math.max(0,b.s),e=Math.min(SLOTS,b.e);if(e<=s)return;
        const div=document.createElement('div');
        div.className='block'+(selBlock===b?' selected':'');
        div.style.cssText=`top:${s*20}px;height:${(e-s)*20}px;background:${c.bg};color:${c.text};`;
        const th=document.createElement('div');th.className='dhandle top';th.addEventListener('mousedown',ev=>{ev.stopPropagation();startDrag(ev,b,'top');});
        const bh=document.createElement('div');bh.className='dhandle bottom';bh.addEventListener('mousedown',ev=>{ev.stopPropagation();startDrag(ev,b,'bottom');});
        const sp=document.createElement('span');sp.textContent=name;
        div.appendChild(th);div.appendChild(sp);div.appendChild(bh);
        div.addEventListener('click',ev=>{ev.stopPropagation();openEditor(b,day.label,name,div);});
        div.addEventListener('mouseenter',ev=>{if(dragging)return;const tip=document.getElementById('tip');tip.innerHTML=`<strong>${name}</strong> — ${day.label}<br>${fmtD(b.s)} → ${fmtD(b.e)} (${hrsStr(b.s,b.e)} hs)`;tip.style.display='block';posTip(ev);});
        div.addEventListener('mousemove',posTip);
        div.addEventListener('mouseleave',()=>{document.getElementById('tip').style.display='none';});
        pcol.appendChild(div);
      });ci.appendChild(pcol);
    });dc.appendChild(ci);da.appendChild(dc);
  });
  document.getElementById('rot-note').textContent=`Viernes: turno temprano → ${days[4].blocks[0].name} · Sáb rotación ${rSab+1}/4 · Dom rotación ${rDom+1}/4`;
  const leg=document.getElementById('legend');leg.innerHTML='';const seen=new Set();
  days.forEach(d=>d.blocks.forEach(b=>{if(!seen.has(b.name)&&EMP[b.name]){seen.add(b.name);const c=EMP[b.name];leg.innerHTML+=`<div class="leg"><div class="lsq" style="background:${c.bg};border:1px solid ${c.color}"></div>${b.name}</div>`;}}));
}
function posTip(ev){const t=document.getElementById('tip');t.style.left=(ev.clientX+14)+'px';t.style.top=(ev.clientY-10)+'px';}
function openEditor(b,label,name,el){
  selBlock=b;curBlock=b;curLabel=label;
  document.getElementById('ed-title').textContent=`${name} — ${label}`;
  document.getElementById('ed-in').value=fmt(b.s);
  document.getElementById('ed-out').value=fmt(b.e);
  updEdDur();
  const r=el.getBoundingClientRect();let left=r.right+10,top=r.top;
  if(left+220>window.innerWidth)left=r.left-228;if(top+220>window.innerHeight)top=window.innerHeight-228;
  const ed=document.getElementById('editor');ed.style.left=left+'px';ed.style.top=top+'px';ed.style.display='block';
  renderGrid();
}
function updEdDur(){if(!curBlock)return;document.getElementById('ed-dur').textContent=`Duración: ${hrsStr(curBlock.s,curBlock.e)} hs`;}
function applyEdit(){
  if(!curBlock)return;
  const iv=document.getElementById('ed-in').value,ov=document.getElementById('ed-out').value;
  if(iv){let [h,m]=iv.split(':').map(Number);if(h<START_H)h+=24;curBlock.s=(h-START_H)*2+(m/30);}
  if(ov){let [h,m]=ov.split(':').map(Number);if((h*60+m)<=(curBlock.s+START_H*2)*30)h+=24;curBlock.e=(h-START_H)*2+(m/30);}
  updEdDur();renderGrid();
}
function shiftBlock(d){if(!curBlock)return;curBlock.s+=d;curBlock.e+=d;document.getElementById('ed-in').value=fmt(curBlock.s);document.getElementById('ed-out').value=fmt(curBlock.e);updEdDur();renderGrid();}
function closeEditor(){selBlock=null;document.getElementById('editor').style.display='none';renderGrid();}
document.addEventListener('click',()=>{if(selBlock){selBlock=null;document.getElementById('editor').style.display='none';renderGrid();}});
function startDrag(ev,b,edge){ev.preventDefault();document.getElementById('tip').style.display='none';dragging={b,edge,startY:ev.clientY,origS:b.s,origE:b.e};document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',stopDrag);}
function onDrag(ev){if(!dragging)return;const delta=Math.round((ev.clientY-dragging.startY)/20);if(dragging.edge==='top'){const ns=Math.max(0,dragging.origS+delta);if(ns<dragging.b.e-1)dragging.b.s=ns;}else{const ne=Math.min(SLOTS+12,dragging.origE+delta);if(ne>dragging.b.s+1)dragging.b.e=ne;}if(curBlock===dragging.b){document.getElementById('ed-in').value=fmt(dragging.b.s);document.getElementById('ed-out').value=fmt(dragging.b.e);updEdDur();}renderGrid();}
function stopDrag(){dragging=null;document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',stopDrag);}
function rotVi(){rVi=(rVi+1)%2;days[4].blocks=mkB(VI[rVi]);closeEditor();renderGrid();}
function rotSab(){rSab=(rSab+1)%4;days[5].blocks=mkB(SAB[rSab]);closeEditor();renderGrid();}
function rotDom(){rDom=(rDom+1)%4;days[6].blocks=mkB(DOM[rDom]);closeEditor();renderGrid();}
// FICHAS
const SCHED={
  Gonzalo:[{s:ps('13:30'),e:ps('21:30')},{s:ps('17:00'),e:ps('21:00')},null,{s:ps('17:00'),e:ps('25:00')},{rot:'Rotativo (13:30 o 18:00)'},{rot:'Rotativo'},{rot:'Rotativo'}],
  Daniela:[{s:ps('17:00'),e:ps('25:00')},{s:ps('13:30'),e:ps('21:00')},{s:ps('13:30'),e:ps('21:00')},{s:ps('18:00'),e:ps('26:00')},null,{rot:'Rotativo'},{rot:'Rotativo'}],
  Erik:[null,{s:ps('18:00'),e:ps('26:00')},{s:ps('17:00'),e:ps('25:00')},{s:ps('13:30'),e:ps('21:30')},{rot:'Rotativo (13:30 o 18:00)'},{rot:'Rotativo'},{rot:'Rotativo'}],
  Cesar:[{s:ps('18:00'),e:ps('26:00')},null,{s:ps('18:00'),e:ps('26:00')},null,{s:ps('17:00'),e:ps('25:00')},{rot:'Rotativo'},null],
  Oscar:[null,{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')}],
  William:[{s:ps('14:00'),e:ps('22:00')},{s:ps('14:00'),e:ps('22:00')},{s:ps('14:00'),e:ps('22:00')},{s:ps('14:00'),e:ps('22:00')},{s:ps('14:00'),e:ps('22:00')},{s:ps('14:00'),e:ps('22:00')},null],
  Miguel:[null,{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')},{s:ps('8:00'),e:ps('16:00')}],
  Felipe:[{s:ps('22:00'),e:ps('32:00')},{s:ps('22:00'),e:ps('32:00')},{s:ps('22:00'),e:ps('32:00')},{s:ps('22:00'),e:ps('32:00')},{s:ps('22:00'),e:ps('32:00')},null,{s:ps('22:00'),e:ps('32:00')}],
};
function calcTotal(name){let t=0;SCHED[name].forEach(d=>{if(d&&d.s!==undefined)t+=hrsN(d.s,d.e);});return t.toFixed(1);}
function buildMsg(name){
  const lines=[`Hola ${name}!`,`Estos son tus horarios de trabajo:`,``];
  DAYS.forEach((day,i)=>{const d=SCHED[name][i];if(!d)lines.push(`• ${day}: Franco`);else if(d.rot)lines.push(`• ${day}: ${d.rot}`);else lines.push(`• ${day}: de ${fmtD(d.s)} a ${fmtD(d.e)} hs`);});
  lines.push(``);lines.push(`Total horas semanales: ${calcTotal(name)} hs`);lines.push(``);lines.push(`Saludos!`);
  return lines.join('\n');
}
function buildSummary(){
  const lines=['Resumen general de horarios','═'.repeat(38),''];
  Object.keys(SCHED).forEach(name=>{
    lines.push(`${name} (${EMP[name].area})`);
    DAYS.forEach((day,i)=>{const d=SCHED[name][i];if(!d)lines.push(`  • ${day}: Franco`);else if(d.rot)lines.push(`  • ${day}: ${d.rot}`);else lines.push(`  • ${day}: de ${fmtD(d.s)} a ${fmtD(d.e)} hs`);});
    lines.push(`  Total: ${calcTotal(name)} hs`);lines.push('');
  });return lines.join('\n');
}
function copyText(text,btnId){navigator.clipboard.writeText(text).then(()=>{const btn=document.getElementById(btnId);const orig=btn.innerHTML;btn.innerHTML='✓ ¡Copiado!';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove('copied');},2200);});}
let activeEmp='summary';
function renderFicha(name){
  const emp=EMP[name],as=AREA_STYLE[emp.area],msg=buildMsg(name),initials=name.slice(0,2).toUpperCase();
  let rows='';
  DAYS.forEach((day,i)=>{const d=SCHED[name][i];if(!d)rows+=`<div class="day-row"><span class="day-lbl">${day}</span><span class="day-sh libre">Franco</span></div>`;else if(d.rot)rows+=`<div class="day-row"><span class="day-lbl">${day}</span><span class="day-sh rot">${d.rot}</span></div>`;else rows+=`<div class="day-row"><span class="day-lbl">${day}</span><span class="day-sh">de ${fmtD(d.s)} a ${fmtD(d.e)}</span><span class="hrs-pill" style="background:${emp.bg};color:${emp.text}">${hrsStr(d.s,d.e)} hs</span></div>`;});
  const mid='copy-'+name;
  document.getElementById('ficha-content').innerHTML=`<div class="card"><div class="card-hdr"><div class="avatar" style="background:${emp.bg};color:${emp.text}">${initials}</div><div class="card-hdr-info"><h2>${name}</h2><span class="badge" style="background:${as.bg};color:${as.text}">${emp.area}</span></div></div><div>${rows}</div><div class="total-bar"><span>Total horas fijas / semana</span><span>${calcTotal(name)} hs</span></div><div class="preview-sec"><h3>Mensaje para compartir</h3><div class="preview-box">${msg}</div><button class="copy-btn" id="${mid}" onclick="copyText(${JSON.stringify(msg)},'${mid}')">📋 Copiar mensaje para ${name}</button></div></div>`;
}
function renderResumen(){
  const names=Object.keys(SCHED);let rows='';
  names.forEach(name=>{
    const emp=EMP[name],as=AREA_STYLE[emp.area];
    const cells=DAYS.map((day,i)=>{const d=SCHED[name][i];if(!d)return`<td><span style="color:var(--faint);font-size:11px;font-style:italic">Franco</span></td>`;if(d.rot)return`<td><span style="color:var(--muted);font-size:10px;font-style:italic">Rot.</span></td>`;return`<td style="font-size:11px;font-family:'DM Mono',monospace">${fmtD(d.s)}<br>${fmtD(d.e)}</td>`;}).join('');
    rows+=`<tr><td><span class="emp-dot" style="background:${emp.color}"></span>${name}<br><span style="font-size:10px;font-weight:400;color:var(--muted)">${emp.area}</span></td>${cells}<td style="font-weight:500;text-align:right">${calcTotal(name)} hs</td></tr>`;
  });
  const txt=buildSummary();
  document.getElementById('resumen-content').innerHTML=`<div class="card"><div class="card-hdr"><div class="card-hdr-info"><h2>Todos los empleados</h2><span style="font-size:12px;color:var(--muted)">${names.length} personas</span></div></div><div class="sum-wrap"><table><thead><tr><th>Empleado</th>${DAYS.map(d=>`<th>${d.slice(0,3)}</th>`).join('')}<th style="text-align:right">Hs</th></tr></thead><tbody>${rows}</tbody></table></div><div class="preview-sec"><h3>Copiar resumen completo</h3><div class="preview-box">${txt}</div><button class="copy-btn" id="copy-summary" onclick="copyText(${JSON.stringify(txt)},'copy-summary')">📋 Copiar resumen completo</button></div></div>`;
}
function initFichas(){
  const tabs=document.getElementById('emp-tabs');tabs.innerHTML='';
  Object.keys(SCHED).forEach(name=>{const emp=EMP[name];const t=document.createElement('button');t.className='etab';t.dataset.name=name;t.innerHTML=`<span class="dot" style="background:${emp.color}"></span>${name}`;t.onclick=()=>{activeEmp=name;refreshEmpTabs();renderFicha(name);};tabs.appendChild(t);});
  const sum=document.createElement('button');sum.className='etab';sum.dataset.name='summary';sum.innerHTML='☰ Resumen';sum.onclick=()=>{activeEmp='summary';refreshEmpTabs();renderResumen();};tabs.appendChild(sum);
  refreshEmpTabs();if(activeEmp==='summary')renderResumen();else renderFicha(activeEmp);
}
function refreshEmpTabs(){document.querySelectorAll('.etab').forEach(t=>t.classList.toggle('active',t.dataset.name===activeEmp));}
function showView(id,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');btn.classList.add('active');
  if(id==='fichas')initFichas();if(id==='resumen')renderResumen();
}
renderGrid();
</script>
